name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python transcript dependency
        run: pip install youtube-transcript-api

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build:web

      - name: Build Electrobun DMG
        env:
          ELECTROBUN_BUNDLE_NEXT: "1"
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
        run: npx electrobun build --env=stable

      - name: List artifacts
        run: ls -lh artifacts/ 2>/dev/null || echo "No artifacts directory"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
          generate_release_notes: true
